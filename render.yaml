services:
  - type: web
    name: viral-copy-generator
    runtime: node
    plan: starter
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-5.2
      - key: RATE_LIMIT_MAX
        value: "20"
      - key: RATE_LIMIT_WINDOW_MS
        value: "600000"
