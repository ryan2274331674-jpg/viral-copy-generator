services:
  - type: web
    name: viral-copy-generator
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: DEEPSEEK_MODEL
        value: deepseek-v4-flash
      - key: RATE_LIMIT_MAX
        value: "20"
      - key: RATE_LIMIT_WINDOW_MS
        value: "600000"
